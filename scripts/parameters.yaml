## SIMULATION PARAMETERS

BULK.SIMULATION:

  band: 'gaia_g' # photometric band to use for the simulation
  max_delta_mag: [4, 3, 3] # max delta mag to simulate
  starting_magnitude: [9, 12.75, 16] # G mag
  central_star_temperature: 5800 # K
  companion_star_temperature: 5800 # K
  distance: np.arange(20,221, 5) # mas
  angle: 90 # degrees
  shot_noise: false
  ron: false


SINGLE.SIMULATION:

  band: 'gaia_g' # photometric band to use for the simulation
  distance: 500
  angle: 90
  shot_noise: false
  ron: false

  CENTRAL.STAR:
    temperature: 5800
    spectral_type: null
    magnitude: 10

  COMPANION.STAR:
    temperature: 5340
    spectral_type: null
    magnitude: 10


